name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            js:
              - 'site/assets/js/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vitest.config.js'
              - '.github/workflows/ci.yml'

  test-js:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.js == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  ci:
    runs-on: ubuntu-latest
    needs: [test-js]
    if: always()
    steps:
      - run: |
          results=(
            "${{ needs.test-js.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "CI failed: job result was '$r'"
              exit 1
            fi
          done
