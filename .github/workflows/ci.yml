name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      js: ${{ steps.filter.outputs.js }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'services/cc-live/**'
              - 'scripts/cc-live/**'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            js:
              - 'assets/js/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.js'
              - '.github/workflows/ci.yml'
            integration:
              - 'services/cc-live/**'
              - 'scripts/cc-live/**'
              - 'site/assets/js/**'
              - 'tests/integration/**'
              - 'compose.test.yaml'
              - '.github/workflows/ci.yml'

  lint-go:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        module: [services/cc-live, scripts/cc-live]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          working-directory: ${{ matrix.module }}

  test-go:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        module: [services/cc-live, scripts/cc-live]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
      - run: go test -race -v -coverprofile=coverage.out ./...
        working-directory: ${{ matrix.module }}

  test-js:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.js == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: [changes, test-go]
    if: |
      always() &&
      needs.changes.outputs.integration == 'true' &&
      (needs.test-go.result == 'success' || needs.test-go.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tests/integration/go.mod
      - run: docker compose -f compose.test.yaml up -d --build --wait
      - run: go test -race -v ./...
        working-directory: tests/integration
        env:
          CC_LIVE_TEST_URL: http://localhost:18080
          CC_LIVE_TEST_API_KEY: test-secret
      - if: always()
        run: docker compose -f compose.test.yaml down

  ci:
    runs-on: ubuntu-latest
    needs: [lint-go, test-go, test-js, integration]
    if: always()
    steps:
      - run: |
          results=(
            "${{ needs.lint-go.result }}"
            "${{ needs.test-go.result }}"
            "${{ needs.test-js.result }}"
            "${{ needs.integration.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "CI failed: job result was '$r'"
              exit 1
            fi
          done
